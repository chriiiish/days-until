openapi: 3.0.3
info:
  title: Days Until API
  description: |
    A lightweight API to calculate the number of days from today to a target date.
    Returns responses in [Shields.io Endpoint Badge](https://shields.io/badges/endpoint-badge) format.
    
    ## Usage
    
    Simply call the endpoint with a date in yyyy-mm-dd format:
    - `/v1/2026-12-25` returns badge-style JSON
    - `/v1/2026-12-25/Pacific/Auckland` calculates using New Zealand timezone
    - `/v1/2026-12-25?label=Christmas&color=green` customizes the badge
    
    The API calculates the difference from today (UTC midnight) to the target date (UTC midnight).
    
    ## Shields.io Integration
    
    Use with Shields.io to create dynamic badges:
    ```markdown
    ![Badge](https://img.shields.io/endpoint?url=https://days-until.cjl.nz/v1/2027-12-25?label=Christmas&color=red)
    ```
    
  version: 1.0.0
  contact:
    name: API Support
  license:
    name: MIT

servers:
  - url: https://days-until.cjl.nz
    description: Production server
  - url: http://localhost:3000
    description: Local development

tags:
  - name: calculations
    description: Date calculation endpoints

paths:
  /v1/{date}:
    get:
      tags:
        - calculations
      summary: Calculate days until a target date
      description: |
        Returns the number of days from today to the specified target date in Shields.io badge format.
        
        - Positive numbers indicate future dates
        - Negative numbers indicate past dates
        - Zero means the date is today
      operationId: getDaysUntil
      parameters:
        - name: date
          in: path
          required: true
          description: Target date in yyyy-mm-dd format
          schema:
            type: string
            format: date
            pattern: '^\d{4}-\d{2}-\d{2}$'
            example: '2026-12-31'
        - name: label
          in: query
          required: false
          description: Custom label for the badge (default is "Days Remaining")
          schema:
            type: string
            example: 'Christmas'
        - name: color
          in: query
          required: false
          description: Badge color (default is "blue"). Also accepts "colour" spelling
          schema:
            type: string
            example: 'green'
      responses:
        '200':
          description: Successful calculation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadgeResponse'
              examples:
                default:
                  summary: Default response
                  value:
                    schemaVersion: 1
                    label: "Days Remaining"
                    message: "192 days"
                    color: "blue"
                custom_label:
                  summary: Custom label and color
                  value:
                    schemaVersion: 1
                    label: "Christmas"
                    message: "192 days"
                    color: "green"
                past_date:
                  summary: Past date (negative)
                  value:
                    schemaVersion: 1
                    label: "Days Remaining"
                    message: "-100 days"
                    color: "blue"
        '400':
          description: Invalid date format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_format:
                  summary: Invalid date format
                  value:
                    error: 'Invalid date format. Use yyyy-mm-dd'
                invalid_path:
                  summary: Invalid path
                  value:
                    error: 'Invalid path format. Expected: /v1/yyyy-mm-dd'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'Internal server error'

  /v1/{date}/{timezone}:
    get:
      tags:
        - calculations
      summary: Calculate days until a target date in a specific timezone
      description: |
        Returns the number of days from today to the specified target date in Shields.io badge format,
        where "today" is evaluated in the provided timezone.
      operationId: getDaysUntilWithTimezone
      parameters:
        - name: date
          in: path
          required: true
          description: Target date in yyyy-mm-dd format
          schema:
            type: string
            format: date
            pattern: '^\d{4}-\d{2}-\d{2}$'
            example: '2026-12-31'
        - name: timezone
          in: path
          required: true
          description: IANA timezone (e.g. Pacific/Auckland)
          schema:
            type: string
            example: 'Pacific/Auckland'
        - name: label
          in: query
          required: false
          description: Custom label for the badge (default is "Days Remaining")
          schema:
            type: string
            example: 'Christmas'
        - name: color
          in: query
          required: false
          description: Badge color (default is "blue"). Also accepts "colour" spelling
          schema:
            type: string
            example: 'green'
      responses:
        '200':
          description: Successful calculation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadgeResponse'
        '400':
          description: Invalid date, timezone, or path format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_timezone:
                  summary: Invalid timezone
                  value:
                    error: 'Invalid timezone. Use a valid IANA timezone (e.g. Pacific/Auckland)'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    BadgeResponse:
      type: object
      description: Shields.io badge format response
      properties:
        schemaVersion:
          type: integer
          description: Badge schema version (always 1)
          example: 1
        label:
          type: string
          description: Badge label text
          example: "Days Remaining"
        message:
          type: string
          description: Badge message showing the number of days
          example: "192 days"
        color:
          type: string
          description: Badge color
          example: "blue"
      required:
        - schemaVersion
        - label
        - message
        - color

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message
          example: 'Invalid date format. Use yyyy-mm-dd'
      required:
        - error
