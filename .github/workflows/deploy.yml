name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  STACK_NAME: days-until

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write  # Required for OIDC authentication

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOYER_ROLE_NAME }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Package Lambda function
        run: |
          cd src
          zip -r ../lambda.zip .
          cd ..

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/template.yaml \
            --stack-name ${{ env.STACK_NAME }} \
            --parameter-overrides \
              HostedZoneId=${{ secrets.HOSTED_ZONE_ID }} \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset

      - name: Upload Swagger docs to S3 origin bucket
        run: |
          DOCS_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='DocsBucketName'].OutputValue" \
            --output text)

          aws s3 cp docs/index.html "s3://${DOCS_BUCKET}/index.html" --content-type "text/html; charset=utf-8"
          aws s3 cp docs/openapi.yaml "s3://${DOCS_BUCKET}/openapi.yaml" --content-type "application/yaml"

      - name: Invalidate CloudFront docs cache
        run: |
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)

          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/" "/index.html" "/openapi.yaml"

      - name: Upload Lambda code to S3
        id: upload
        run: |
          DOCS_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='DocsBucketName'].OutputValue" \
            --output text)
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          S3_KEY="lambda-deployments/days-until-api-${TIMESTAMP}.zip"
          
          aws s3 cp lambda.zip "s3://${DOCS_BUCKET}/${S3_KEY}"
          
          echo "s3_bucket=${DOCS_BUCKET}" >> $GITHUB_OUTPUT
          echo "s3_key=${S3_KEY}" >> $GITHUB_OUTPUT

      - name: Update Lambda function code
        run: |
          FUNCTION_NAME=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='LambdaFunctionName'].OutputValue" \
            --output text)
          
          aws lambda update-function-code \
            --function-name ${FUNCTION_NAME} \
            --s3-bucket ${{ steps.upload.outputs.s3_bucket }} \
            --s3-key ${{ steps.upload.outputs.s3_key }}

      - name: Get API URL
        id: get_url
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontUrl'].OutputValue" \
            --output text)
          
          echo "api_url=${API_URL}" >> $GITHUB_OUTPUT
          echo "🚀 API deployed to: ${API_URL}"

      - name: Test API endpoint
        run: |
          sleep 5  # Wait for deployment to propagate
          
          # Test with a future date
          RESPONSE=$(curl -s "${{ steps.get_url.outputs.api_url }}/v1/2027-01-01")
          echo "Test response: ${RESPONSE}"
          
          # Verify response contains "days" field
          if echo "${RESPONSE}" | grep -q '"message"'; then
            echo "✅ API test passed"
          else
            echo "❌ API test failed"
            exit 1
          fi