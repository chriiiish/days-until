AWSTemplateFormatVersion: '2010-09-09'
Description: 'Days Until API - CloudFront with Lambda@Edge'

Parameters:
  DomainName:
    Type: String
    Default: 'days-until.cjl.nz'
    Description: 'Custom domain name for the API'
  
  HostedZoneId:
    Type: String
    Description: 'Route53 Hosted Zone ID (required for certificate validation and DNS record)'
    Default: ''

Conditions:
  CreateDNSRecord: !Not [!Equals [!Ref HostedZoneId, '']]

Resources:
  # ACM Certificate for CloudFront (must be in us-east-1)
  Certificate:
    Type: 'AWS::CertificateManager::Certificate'
    Condition: CreateDNSRecord
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - Key: Project
          Value: DaysUntil

  # Lambda@Edge Execution Role
  LambdaEdgeExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
                - edgelambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Tags:
        - Key: Project
          Value: DaysUntil

  # Lambda@Edge Function (must be in us-east-1)
  DaysUntilFunction:
    Type: 'AWS::Lambda::Function'
    Properties:
      FunctionName: days-until-edge
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaEdgeExecutionRole.Arn
      Code:
        ZipFile: |
          /**
           * Lambda@Edge handler for days-until API
           * Calculates the number of days from today to a target date
           * Returns badge-style JSON format
           * Triggered on CloudFront origin-request (cache miss)
           */

          export const handler = async (event) => {
            const request = event.Records[0].cf.request;
            const uri = request.uri;
            const querystring = request.querystring;

            // Parse query parameters
            const params = new URLSearchParams(querystring);
            
            // Handle OPTIONS preflight request
            if (request.method === 'OPTIONS') {
              return {
                status: '200',
                statusDescription: 'OK',
                headers: {
                  'content-type': [{ key: 'Content-Type', value: 'application/json' }],
                  'access-control-allow-origin': [{ key: 'Access-Control-Allow-Origin', value: '*' }],
                  'access-control-allow-methods': [{ key: 'Access-Control-Allow-Methods', value: 'GET, OPTIONS' }],
                  'access-control-allow-headers': [{ key: 'Access-Control-Allow-Headers', value: 'Content-Type' }],
                  'cache-control': [{ key: 'Cache-Control', value: 'public, max-age=21600' }],
                },
                body: '',
              };
            }

            try {
              // Extract date from path: /v1/yyyy-mm-dd
              const pathMatch = uri.match(/\/v1\/(\d{4}-\d{2}-\d{2})/);
              
              if (!pathMatch) {
                return {
                  status: '400',
                  statusDescription: 'Bad Request',
                  headers: {
                    'content-type': [{ key: 'Content-Type', value: 'application/json' }],
                    'access-control-allow-origin': [{ key: 'Access-Control-Allow-Origin', value: '*' }],
                  },
                  body: JSON.stringify({
                    error: 'Invalid path format. Expected: /v1/yyyy-mm-dd',
                  }),
                };
              }

              const targetDateStr = pathMatch[1];
              
              // Parse the target date
              const targetDate = new Date(targetDateStr + 'T00:00:00Z');
              
              // Validate date
              if (Number.isNaN(targetDate.getTime())) {
                return {
                  status: '400',
                  statusDescription: 'Bad Request',
                  headers: {
                    'content-type': [{ key: 'Content-Type', value: 'application/json' }],
                    'access-control-allow-origin': [{ key: 'Access-Control-Allow-Origin', value: '*' }],
                  },
                  body: JSON.stringify({
                    error: 'Invalid date format. Use yyyy-mm-dd',
                  }),
                };
              }

              // Calculate days until target date
              const today = new Date();
              today.setUTCHours(0, 0, 0, 0);
              
              const diffTime = targetDate.getTime() - today.getTime();
              const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

              // Get query parameters (support both 'color' and 'colour' spellings)
              const label = params.get('label') || 'Days Remaining';
              const color = params.get('color') || params.get('colour') || 'blue';

              // Build badge-style response
              const response = {
                schemaVersion: 1,
                label: label,
                message: `${diffDays} days`,
                color: color,
              };

              return {
                status: '200',
                statusDescription: 'OK',
                headers: {
                  'content-type': [{ key: 'Content-Type', value: 'application/json' }],
                  'access-control-allow-origin': [{ key: 'Access-Control-Allow-Origin', value: '*' }],
                  'cache-control': [{ key: 'Cache-Control', value: 'public, max-age=21600' }],
                },
                body: JSON.stringify(response),
              };

            } catch (error) {
              console.error('Error processing request:', error);
              
              return {
                status: '500',
                statusDescription: 'Internal Server Error',
                headers: {
                  'content-type': [{ key: 'Content-Type', value: 'application/json' }],
                  'access-control-allow-origin': [{ key: 'Access-Control-Allow-Origin', value: '*' }],
                },
                body: JSON.stringify({
                  error: 'Internal server error',
                }),
              };
            }
          };
      Timeout: 5  # Lambda@Edge limit for origin-request
      MemorySize: 128
      Tags:
        - Key: Project
          Value: DaysUntil

  # Lambda@Edge Version (CloudFront requires a specific version, not $LATEST)
  DaysUntilFunctionVersion:
    Type: 'AWS::Lambda::Version'
    Properties:
      FunctionName: !Ref DaysUntilFunction
      Description: 'Version for Lambda@Edge deployment'

  # Lambda Permission for CloudFront and Edge replication
  LambdaEdgePermission:
    Type: 'AWS::Lambda::Permission'
    Properties:
      FunctionName: !GetAtt DaysUntilFunction.Arn
      Action: 'lambda:GetFunction'
      Principal: 'replicator.lambda.amazonaws.com'

  LambdaEdgeInvokePermission:
    Type: 'AWS::Lambda::Permission'
    Properties:
      FunctionName: !GetAtt DaysUntilFunction.Arn
      Action: 'lambda:InvokeFunction'
      Principal: 'edgelambda.amazonaws.com'

  # Lambda Log Group
  LambdaLogGroup:
    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName: !Sub '/aws/lambda/${DaysUntilFunction}'
      RetentionInDays: 7
      Tags:
        - Key: Project
          Value: DaysUntil

  # CloudFront Cache Policy
  ApiCachePolicy:
    Type: 'AWS::CloudFront::CachePolicy'
    Properties:
      CachePolicyConfig:
        Name: !Sub '${AWS::StackName}-cache-policy'
        Comment: '6-hour cache with query string support'
        DefaultTTL: 21600  # 6 hours
        MaxTTL: 21600      # 6 hours
        MinTTL: 21600      # 6 hours
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          QueryStringsConfig:
            QueryStringBehavior: all  # Cache based on query params (label, color)
          HeadersConfig:
            HeaderBehavior: none
          CookiesConfig:
            CookieBehavior: none

  # CloudFront Distribution (with Lambda@Edge)
  CloudFrontDistribution:
    Type: 'AWS::CloudFront::Distribution'
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: 'CloudFront distribution for Days Until API with Lambda@Edge'
        HttpVersion: http2and3
        PriceClass: PriceClass_100  # Use only North America and Europe edges (cheapest)
        Aliases:
          !If
            - CreateDNSRecord
            - [!Ref DomainName]
            - !Ref 'AWS::NoValue'
        ViewerCertificate:
          !If
            - CreateDNSRecord
            - AcmCertificateArn: !Ref Certificate
              SslSupportMethod: sni-only
              MinimumProtocolVersion: TLSv1.2_2021
            - CloudFrontDefaultCertificate: true
        Origins:
          - Id: DummyOrigin
            DomainName: example.com  # Dummy origin (Lambda@Edge generates response)
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: DummyOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachePolicyId: !Ref ApiCachePolicy
          Compress: true
          LambdaFunctionAssociations:
            - EventType: origin-request
              LambdaFunctionARN: !Ref DaysUntilFunctionVersion  # Must use versioned ARN
      Tags:
        - Key: Project
          Value: DaysUntil

  # Route53 Record (points to CloudFront)
  ApiDNSRecord:
    Type: 'AWS::Route53::RecordSet'
    Condition: CreateDNSRecord
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront hosted zone ID (constant for all distributions)

Outputs:
  CloudFrontUrl:
    Description: 'CloudFront distribution URL (use this endpoint)'
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-CloudFrontUrl'

  CustomDomainUrl:
    Description: 'Custom domain URL (if configured)'
    Value: !Sub 'https://${DomainName}'
    Condition: CreateDNSRecord

  CertificateArn:
    Description: 'ACM Certificate ARN'
    Value: !Ref Certificate
    Condition: CreateDNSRecord

  LambdaFunctionName:
    Description: 'Lambda@Edge function name'
    Value: !Ref DaysUntilFunction
    Export:
      Name: !Sub '${AWS::StackName}-LambdaFunction'

  LambdaFunctionArn:
    Description: 'Lambda@Edge function ARN'
    Value: !GetAtt DaysUntilFunction.Arn

  LambdaFunctionVersion:
    Description: 'Lambda@Edge function version ARN'
    Value: !Ref DaysUntilFunctionVersion

  CloudFrontDistributionId:
    Description: 'CloudFront distribution ID'
    Value: !Ref CloudFrontDistribution
