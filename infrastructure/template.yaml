AWSTemplateFormatVersion: '2010-09-09'
Description: 'Days Until API - CloudFront with Lambda@Edge'

Parameters:
  DomainName:
    Type: String
    Default: 'days-until.cjl.nz'
    Description: 'Custom domain name for the API'
  
  HostedZoneId:
    Type: String
    Description: 'Route53 Hosted Zone ID (optional - leave empty if managing DNS manually)'
    Default: ''

  CertificateArn:
    Type: String
    Description: 'ACM Certificate ARN for CloudFront (must be in us-east-1)'
    Default: ''

Conditions:
  CreateDNSRecord: !Not [!Equals [!Ref HostedZoneId, '']]
  HasCertificate: !Not [!Equals [!Ref CertificateArn, '']]

Resources:
  # Lambda@Edge Execution Role
  LambdaEdgeExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
                - edgelambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Tags:
        - Key: Project
          Value: DaysUntil

  # Lambda@Edge Function (must be in us-east-1)
  DaysUntilFunction:
    Type: 'AWS::Lambda::Function'
    Properties:
      FunctionName: days-until-edge
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaEdgeExecutionRole.Arn
      Code:
        ZipFile: |
          export const handler = async (event) => {
            return {
              status: '200',
              statusDescription: 'OK',
              headers: {
                'content-type': [{ key: 'Content-Type', value: 'application/json' }],
                'access-control-allow-origin': [{ key: 'Access-Control-Allow-Origin', value: '*' }],
              },
              body: JSON.stringify({ message: 'Placeholder - deploy actual code' })
            };
          };
      Timeout: 5  # Lambda@Edge limit for origin-request
      MemorySize: 128
      Tags:
        - Key: Project
          Value: DaysUntil

  # Lambda@Edge Version (CloudFront requires a specific version, not $LATEST)
  DaysUntilFunctionVersion:
    Type: 'AWS::Lambda::Version'
    Properties:
      FunctionName: !Ref DaysUntilFunction
      Description: 'Version for Lambda@Edge deployment'

  # Lambda Log Group
  LambdaLogGroup:
    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName: !Sub '/aws/lambda/${DaysUntilFunction}'
      RetentionInDays: 7
      Tags:
        - Key: Project
          Value: DaysUntil

  # CloudFront Cache Policy
  ApiCachePolicy:
    Type: 'AWS::CloudFront::CachePolicy'
    Properties:
      CachePolicyConfig:
        Name: !Sub '${AWS::StackName}-cache-policy'
        Comment: '6-hour cache with query string support'
        DefaultTTL: 21600  # 6 hours
        MaxTTL: 21600      # 6 hours
        MinTTL: 21600      # 6 hours
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          QueryStringsConfig:
            QueryStringBehavior: all  # Cache based on query params (label, color)
          HeadersConfig:
            HeaderBehavior: none
          CookiesConfig:
            CookieBehavior: none

  # CloudFront Distribution (with Lambda@Edge)
  CloudFrontDistribution:
    Type: 'AWS::CloudFront::Distribution'
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: 'CloudFront distribution for Days Until API with Lambda@Edge'
        HttpVersion: http2and3
        PriceClass: PriceClass_100  # Use only North America and Europe edges (cheapest)
        Aliases:
          !If
            - HasCertificate
            - [!Ref DomainName]
            - !Ref 'AWS::NoValue'
        ViewerCertificate:
          !If
            - HasCertificate
            - AcmCertificateArn: !Ref CertificateArn
              SslSupportMethod: sni-only
              MinimumProtocolVersion: TLSv1.2_2021
            - CloudFrontDefaultCertificate: true
        Origins:
          - Id: DummyOrigin
            DomainName: example.com  # Dummy origin (Lambda@Edge generates response)
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: DummyOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachePolicyId: !Ref ApiCachePolicy
          Compress: true
          LambdaFunctionAssociations:
            - EventType: origin-request
              LambdaFunctionARN: !Ref DaysUntilFunctionVersion  # Must use versioned ARN
      Tags:
        - Key: Project
          Value: DaysUntil

  # Route53 Record (points to CloudFront)
  ApiDNSRecord:
    Type: 'AWS::Route53::RecordSet'
    Condition: CreateDNSRecord
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront hosted zone ID (constant for all distributions)

Outputs:
  CloudFrontUrl:
    Description: 'CloudFront distribution URL (use this endpoint)'
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-CloudFrontUrl'

  CustomDomainUrl:
    Description: 'Custom domain URL (if configured)'
    Value: !Sub 'https://${DomainName}'
    Condition: HasCertificate

  LambdaFunctionName:
    Description: 'Lambda@Edge function name'
    Value: !Ref DaysUntilFunction
    Export:
      Name: !Sub '${AWS::StackName}-LambdaFunction'

  LambdaFunctionArn:
    Description: 'Lambda@Edge function ARN'
    Value: !GetAtt DaysUntilFunction.Arn

  LambdaFunctionVersion:
    Description: 'Lambda@Edge function version ARN'
    Value: !Ref DaysUntilFunctionVersion

  CloudFrontDistributionId:
    Description: 'CloudFront distribution ID'
    Value: !Ref CloudFrontDistribution

  ApiId:
    Description: 'API Gateway ID'
    Value: !Ref DaysUntilApi
    Export:
      Name: !Sub '${AWS::StackName}-ApiId'
