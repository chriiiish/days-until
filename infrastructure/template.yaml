AWSTemplateFormatVersion: '2010-09-09'
Description: | 
  Days Until API
  A lightweight API to calculate the number of days from today to a target date.
  Returns responses in Shields.io Endpoint Badge format.

Parameters:
  DomainName:
    Type: String
    Default: 'days-until.cjl.nz'
    Description: 'Custom domain name for the API'
  
  HostedZoneId:
    Type: String
    Description: 'Route53 Hosted Zone ID (required for certificate validation and DNS record)'
    Default: ''

Conditions:
  CreateDNSRecord: !Not [!Equals [!Ref HostedZoneId, '']]

Resources:
  # ACM Certificate for CloudFront (must be in us-east-1)
  Certificate:
    Type: 'AWS::CertificateManager::Certificate'
    Condition: CreateDNSRecord
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - Key: Project
          Value: DaysUntil

  # Lambda@Edge Execution Role
  LambdaEdgeExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
                - edgelambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Tags:
        - Key: Project
          Value: DaysUntil

  # Lambda@Edge Function (must be in us-east-1)
  DaysUntilFunction:
    Type: 'AWS::Lambda::Function'
    Properties:
      FunctionName: days-until-edge
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaEdgeExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
              return {
                  status: '200',
                  statusDescription: 'OK',
                  headers: {
                      'content-type': [{ key: 'Content-Type', value: 'application/json' }],
                  },
                  body: JSON.stringify({ message: 'Deployment In Progress' }),
              };
          };
      Timeout: 5  # Lambda@Edge limit for origin-request
      MemorySize: 128
      Tags:
        - Key: Project
          Value: DaysUntil

  # Lambda@Edge Version (CloudFront requires a specific version, not $LATEST)
  DaysUntilFunctionVersion:
    Type: 'AWS::Lambda::Version'
    Properties:
      FunctionName: !Ref DaysUntilFunction
      Description: 'Version for Lambda@Edge deployment'

  # Lambda Permission for CloudFront and Edge replication
  LambdaEdgePermission:
    Type: 'AWS::Lambda::Permission'
    Properties:
      FunctionName: !GetAtt DaysUntilFunction.Arn
      Action: 'lambda:GetFunction'
      Principal: 'replicator.lambda.amazonaws.com'

  LambdaEdgeInvokePermission:
    Type: 'AWS::Lambda::Permission'
    Properties:
      FunctionName: !GetAtt DaysUntilFunction.Arn
      Action: 'lambda:InvokeFunction'
      Principal: 'edgelambda.amazonaws.com'

  # Lambda Log Group
  LambdaLogGroup:
    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName: !Sub '/aws/lambda/${DaysUntilFunction}'
      RetentionInDays: 7
      Tags:
        - Key: Project
          Value: DaysUntil

  # CloudFront Cache Policy
  ApiCachePolicy:
    Type: 'AWS::CloudFront::CachePolicy'
    Properties:
      CachePolicyConfig:
        Name: !Sub '${AWS::StackName}-cache-policy'
        Comment: '1-hour cache with query string support'
        DefaultTTL: 3600  # 1 hour
        MaxTTL: 3600      # 1 hour
        MinTTL: 3600      # 1 hour
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          QueryStringsConfig:
            QueryStringBehavior: all  # Cache based on query params (label, color)
          HeadersConfig:
            HeaderBehavior: none
          CookiesConfig:
            CookieBehavior: none

  # S3 bucket for Swagger documentation static files
  DocsBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      Tags:
        - Key: Project
          Value: DaysUntil

  # CloudFront Origin Access Control for S3 docs bucket
  DocsOriginAccessControl:
    Type: 'AWS::CloudFront::OriginAccessControl'
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-docs-oac'
        Description: Access control for docs S3 origin
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # Allow CloudFront distribution to read docs bucket objects
  DocsBucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref DocsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: 's3:GetObject'
            Resource: !Sub '${DocsBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  # CloudFront Distribution (with Lambda@Edge)
  CloudFrontDistribution:
    Type: 'AWS::CloudFront::Distribution'
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: 'CloudFront distribution for Days Until API with Lambda@Edge'
        HttpVersion: http2and3
        PriceClass: PriceClass_100  # Use only North America and Europe edges (cheapest)
        DefaultRootObject: docs/index.html
        Aliases:
          !If
            - CreateDNSRecord
            - [!Ref DomainName]
            - !Ref 'AWS::NoValue'
        ViewerCertificate:
          !If
            - CreateDNSRecord
            - AcmCertificateArn: !Ref Certificate
              SslSupportMethod: sni-only
              MinimumProtocolVersion: TLSv1.2_2021
            - CloudFrontDefaultCertificate: true
        Origins:
          - Id: DocsS3Origin
            DomainName: !GetAtt DocsBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !GetAtt DocsOriginAccessControl.Id
          - Id: ApiFallbackOrigin
            DomainName: example.com  # Dummy origin (Lambda@Edge generates response)
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: DocsS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # Managed-CachingOptimized
          Compress: true
        OrderedCacheBehaviors:
          - PathPattern: '/v1/*'
            TargetOriginId: ApiFallbackOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachePolicyId: !Ref ApiCachePolicy
            Compress: true
            LambdaFunctionAssociations:
              - EventType: origin-request
                LambdaFunctionARN: !Ref DaysUntilFunctionVersion  # Must use versioned ARN
      Tags:
        - Key: Project
          Value: DaysUntil

  # Route53 Record (points to CloudFront)
  ApiDNSRecord:
    Type: 'AWS::Route53::RecordSet'
    Condition: CreateDNSRecord
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront hosted zone ID (constant for all distributions)

Outputs:
  CloudFrontUrl:
    Description: 'CloudFront distribution URL (use this endpoint)'
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-CloudFrontUrl'

  CustomDomainUrl:
    Description: 'Custom domain URL (if configured)'
    Value: !Sub 'https://${DomainName}'
    Condition: CreateDNSRecord

  CertificateArn:
    Description: 'ACM Certificate ARN'
    Value: !Ref Certificate
    Condition: CreateDNSRecord

  LambdaFunctionName:
    Description: 'Lambda@Edge function name'
    Value: !Ref DaysUntilFunction
    Export:
      Name: !Sub '${AWS::StackName}-LambdaFunction'

  LambdaFunctionArn:
    Description: 'Lambda@Edge function ARN'
    Value: !GetAtt DaysUntilFunction.Arn

  LambdaFunctionVersion:
    Description: 'Lambda@Edge function version ARN'
    Value: !Ref DaysUntilFunctionVersion

  CloudFrontDistributionId:
    Description: 'CloudFront distribution ID'
    Value: !Ref CloudFrontDistribution

  DocsBucketName:
    Description: 'S3 bucket name for Swagger docs static files'
    Value: !Ref DocsBucket
    Export:
      Name: !Sub '${AWS::StackName}-DocsBucketName'
