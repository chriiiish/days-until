AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Creates a least-privilege IAM user for deploying the Days Until stack directly,
  without any assume-role flow.

Parameters:
  DeploymentUserName:
    Type: String
    Default: days-until-deployer
    Description: IAM user name for deployments
    AllowedPattern: '[a-zA-Z0-9+=,.@_-]{1,64}'

  TargetStackName:
    Type: String
    Default: days-until
    Description: Name of the CloudFormation stack this user can deploy
    AllowedPattern: '[a-zA-Z][-a-zA-Z0-9]*'

Resources:
  DaysUntilDeployerUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Ref DeploymentUserName
      ManagedPolicyArns:
        - !Ref DaysUntilDeployerCloudFormationPolicy
        - !Ref DaysUntilDeployerApplicationResourcesPolicy

  DaysUntilDeployerCloudFormationPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${TargetStackName}-deployer-cloudformation-policy'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # CloudFormation deployment permissions for one stack
          - Sid: CloudFormationDeploySingleStack
            Effect: Allow
            Action:
              - cloudformation:CreateStack
              - cloudformation:UpdateStack
              - cloudformation:DeleteStack
              - cloudformation:DescribeStacks
              - cloudformation:DescribeStackEvents
              - cloudformation:DescribeStackResources
              - cloudformation:GetTemplate
              - cloudformation:GetTemplateSummary
              - cloudformation:ValidateTemplate
              - cloudformation:ListStackResources
              - cloudformation:CreateChangeSet
              - cloudformation:DescribeChangeSet
              - cloudformation:ExecuteChangeSet
              - cloudformation:DeleteChangeSet
            Resource:
              - !Sub 'arn:aws:cloudformation:us-east-1:${AWS::AccountId}:stack/${TargetStackName}/*'
              - !Sub 'arn:aws:cloudformation:us-east-1:${AWS::AccountId}:changeSet/*/*'

          # Useful for deployment scripts
          - Sid: ReadCallerIdentity
            Effect: Allow
            Action:
              - sts:GetCallerIdentity
            Resource: '*'

  DaysUntilDeployerApplicationResourcesPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${TargetStackName}-deployer-app-resources-policy'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:

          # IAM role management for Lambda execution role created in stack
          - Sid: IamRoleManagementForLambda
            Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:GetRole
              - iam:TagRole
              - iam:UntagRole
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:PassRole
            Resource: '*'
            Condition:
              StringEquals:
                iam:PassedToService:
                  - lambda.amazonaws.com
                  - edgelambda.amazonaws.com

          # Lambda and Lambda@Edge management for this project
          - Sid: LambdaManagement
            Effect: Allow
            Action:
              - lambda:CreateFunction
              - lambda:DeleteFunction
              - lambda:GetFunction
              - lambda:GetFunctionConfiguration
              - lambda:UpdateFunctionCode
              - lambda:UpdateFunctionConfiguration
              - lambda:PublishVersion
              - lambda:DeleteFunctionConcurrency
              - lambda:AddPermission
              - lambda:RemovePermission
              - lambda:TagResource
              - lambda:UntagResource
            Resource:
              - !Sub 'arn:aws:lambda:us-east-1:${AWS::AccountId}:function:days-until-edge*'

          # CloudWatch Logs management for Lambda log groups in this account
          - Sid: LogGroupManagement
            Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:DeleteLogGroup
              - logs:PutRetentionPolicy
              - logs:DeleteRetentionPolicy
              - logs:TagResource
              - logs:UntagResource
            Resource:
              - !Sub 'arn:aws:logs:us-east-1:${AWS::AccountId}:log-group:/aws/lambda/*'

          # CloudFront resources used by this stack + invalidations
          - Sid: CloudFrontManagement
            Effect: Allow
            Action:
              - cloudfront:CreateDistribution
              - cloudfront:GetDistribution
              - cloudfront:GetDistributionConfig
              - cloudfront:UpdateDistribution
              - cloudfront:DeleteDistribution
              - cloudfront:CreateInvalidation
              - cloudfront:TagResource
              - cloudfront:UntagResource
              - cloudfront:CreateCachePolicy
              - cloudfront:GetCachePolicy
              - cloudfront:DeleteCachePolicy
              - cloudfront:ListCachePolicies
              - cloudfront:CreateOriginAccessControl
              - cloudfront:GetOriginAccessControl
              - cloudfront:UpdateOriginAccessControl
              - cloudfront:DeleteOriginAccessControl
              - cloudfront:ListOriginAccessControls
            Resource: '*'

          # ACM certificate actions for custom domain support
          - Sid: AcmCertificateManagement
            Effect: Allow
            Action:
              - acm:RequestCertificate
              - acm:DescribeCertificate
              - acm:DeleteCertificate
              - acm:AddTagsToCertificate
              - acm:RemoveTagsFromCertificate
              - acm:ListTagsForCertificate
            Resource: '*'

          # Route53 DNS updates for alias record creation
          - Sid: Route53RecordManagement
            Effect: Allow
            Action:
              - route53:ChangeResourceRecordSets
              - route53:GetChange
            Resource: '*'

          # S3 management for docs bucket creation/config and object uploads
          - Sid: S3BucketManagement
            Effect: Allow
            Action:
              - s3:CreateBucket
              - s3:DeleteBucket
              - s3:PutBucketPolicy
              - s3:DeleteBucketPolicy
              - s3:GetBucketPolicy
              - s3:PutBucketPublicAccessBlock
              - s3:GetBucketPublicAccessBlock
              - s3:PutBucketOwnershipControls
              - s3:GetBucketOwnershipControls
              - s3:PutBucketTagging
              - s3:GetBucketTagging
              - s3:DeleteBucketTagging
              - s3:GetBucketLocation
              - s3:ListBucket
            Resource: '*'

          - Sid: S3ObjectUploadForDocsAndLambdaZip
            Effect: Allow
            Action:
              - s3:PutObject
              - s3:DeleteObject
              - s3:GetObject
            Resource: '*'

Outputs:
  DeploymentUserName:
    Description: IAM user with permission to deploy the target stack
    Value: !Ref DaysUntilDeployerUser

  DeploymentUserArn:
    Description: ARN of the deployment IAM user
    Value: !GetAtt DaysUntilDeployerUser.Arn
